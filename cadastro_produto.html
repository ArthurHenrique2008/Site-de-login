<html>
<head>
    <title>Cadastro de produto</title>
</head>
<body bgcolor="#F0F8FF">

    <table border="1" width="450" align="center" cellpadding="20" bgcolor="white">
        <tr>
            <td>
                <h1 align="center">Novo item</h1>
                
                <b>Nome do produto:</b><br>
                <input type="text"><br><br>

                <b>Descrição:</b><br>
                <textarea rows="4" cols="40"></textarea><br><br>

                <b>Unidade de medida:</b><br>
                <select>
                    <option>Unidade (un)</option>
                    <option>Quilo (kg)</option>
                    <option>Caixa (cx)</option>
                </select><br><br>

                <b>Quantidade:</b><br>
                <input type="number"><br><br>

                <b>Valor:</b><br>
                <input type="text"><br><br>

                <p align="center">
                    <a href="principal.html">
                        <button><b>Finalizar cadastro</b></button>
                    </a>
                </p>
            </td>
        </tr>
    </table>

</body>
</html>
